services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - path: .env
        required: false
    environment:
      MONGODB_URI: mongodb://mongo:27017/health_mcp
      PORT: "${PORT:-3000}"
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
